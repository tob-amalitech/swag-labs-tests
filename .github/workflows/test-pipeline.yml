name: Swag Labs Test Suite – Docker CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-and-test:
    name: Build Docker Image & Run Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (faster multi-stage builds) ─
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Cache Docker layers ───────────────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ── 4. Build the Docker image ───────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --tag swag-labs-tests:${{ github.sha }} \
            --tag swag-labs-tests:latest \
            .

      # ── 5. Run the test suite inside the container ──────────
      - name: Run test suite in Docker container
        run: |
          docker run --rm \
            --name swag-labs-run \
            --shm-size=2gb \
            -v ${{ github.workspace }}/test-results:/app/target/surefire-reports \
            swag-labs-tests:latest

      # ── 6. Upload test reports as artifacts ─────────────────
      - name: Upload TestNG reports
        if: always()   # upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      # ── 7. Print container logs on failure ──────────────────
      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "=== Last Docker container logs ==="
          docker logs swag-labs-run || true
